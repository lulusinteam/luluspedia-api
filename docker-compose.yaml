services:
  postgres:
    image: postgres:17.6-alpine
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - boilerplate-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

  maildev:
    build:
      context: .
      dockerfile: maildev.Dockerfile
    ports:
      - ${MAIL_CLIENT_PORT}:1080
      - ${MAIL_PORT}:1025

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  # Unified API Service — handles BOTH Admin and User domains via Host-Based Routing
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000" # User Port
      - "7000:3000" # Admin Port
    environment:
      - PORT=3000
      - APP_PORT=3000
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  boilerplate-db:
