services:
  postgres:
    image: postgres:17.6-alpine
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - boilerplate-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

  maildev:
    build:
      context: .
      dockerfile: maildev.Dockerfile
    ports:
      - ${MAIL_CLIENT_PORT}:1080
      - ${MAIL_PORT}:1025

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  # Uncomment to use redis
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - 6379:6379

  # User API — handles register, login (user only), forgot-password, etc.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${APP_PORT}:${APP_PORT}
    env_file:
      - .env
    depends_on:
      - postgres

  # Admin API — handles login (admin only), separate port & swagger
  api-admin:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/opt/startup.admin.sh"]
    ports:
      - ${ADMIN_PORT}:${ADMIN_PORT}
    env_file:
      - .env
    depends_on:
      - postgres
      - api   # Pastikan User API (yang run migration) sudah up duluan

volumes:
  boilerplate-db:
